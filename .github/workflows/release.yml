name: Release Plugin ZIP

on:
  push:
    tags:
      - 'v*'        # triggers on v1.2.0, v1.3.0, etc.

permissions:
  contents: write   # needed to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The git tag is the single source of truth for the version. Stamp it into
      # the plugin PHP file (header + KLOUDSTACK_MIGRATION_VERSION constant) so the
      # released ZIP always matches the tag — no manual file bump before tagging.
      - name: Stamp version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # v1.9.1 -> 1.9.1
          FILE=kloudstack-migration/kloudstack-migration.php
          sed -i -E "s/^( \* Version:[[:space:]]*).*/\1${VERSION}/" "$FILE"
          sed -i -E "s/(define\(\s*'KLOUDSTACK_MIGRATION_VERSION',\s*')[^']*(')/\1${VERSION}\2/" "$FILE"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Stamped plugin version: $VERSION"
          grep -nE 'Version:|KLOUDSTACK_MIGRATION_VERSION' "$FILE"

      # Compress the plugin folder so WordPress can unzip it as
      # wp-content/plugins/kloudstack-migration/
      - name: Build ZIP
        run: |
          zip -r kloudstack-migration.zip kloudstack-migration/
          echo "ZIP size: $(du -sh kloudstack-migration.zip | cut -f1)"

      # Read the CHANGELOG entry for this version to use as release notes.
      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract text between this version heading and the next
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to a file to avoid multiline env var issues
          echo "$NOTES" > release_notes.txt
          cat release_notes.txt

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: KloudStack Migration Plugin ${{ github.ref_name }}
          body_path: release_notes.txt
          files: kloudstack-migration.zip
          fail_on_unmatched_files: true
